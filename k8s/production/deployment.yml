 apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: receipt-splitter-production
        namespace: production
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: receipt-splitter
            environment: production
        template:
          metadata:
            labels:
              app: receipt-splitter
              environment: production
          spec:
            containers:
            - name: app
              image: ghcr.io/TheRealGtx/receipt-splitter:latest
              ports:
              - containerPort: 8080
              env:
              - name: NODE_ENV
                value: "production"
              - name: PORT
                value: "8080"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
              livenessProbe:
                httpGet:
                  path: /
                  port: 8080
                initialDelaySeconds: 30
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 5
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: receipt-splitter-production
        namespace: production
      spec:
        selector:
          app: receipt-splitter
          environment: production
        ports:
        - protocol: TCP
          port: 80
          targetPort: 8080
        type: LoadBalancer