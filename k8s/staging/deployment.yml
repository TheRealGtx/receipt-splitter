apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: receipt-splitter-staging
        namespace: staging
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: receipt-splitter
            environment: staging
        template:
          metadata:
            labels:
              app: receipt-splitter
              environment: staging
          spec:
            containers:
            - name: web
              image: ghcr.io/TheRealGtx/receipt-splitter:develop
              ports:
              - containerPort: 8080
              env:
              - name: NODE_ENV
                value: "staging"
              - name: PORT
                value: "8080"
              livenessProbe:
                httpGet:
                  path: /
                  port: 8080
                initialDelaySeconds: 30
                periodSeconds: 10
              readinessProbe:
                httpGet:
                  path: /
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 5
      ---
      apiVersion: v1
      kind: Service
      metadata:
        name: receipt-splitter-staging
        namespace: staging
      spec:
        selector:
          app: receipt-splitter
          environment: staging
        ports:
        - protocol: TCP
          port: 80
          targetPort: 8080
        type: LoadBalancer